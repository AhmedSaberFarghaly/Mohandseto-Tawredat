<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الطلبات</title>
  <style>body{font-family:Tahoma,Arial,sans-serif;margin:0;background:#f5f7fb;color:#1f2937} a{color:#2563eb;text-decoration:none} .nav{background:#111827;padding:16px 24px;display:flex;gap:16px;flex-wrap:wrap}.nav a{color:white}.container{max-width:1200px;margin:0 auto;padding:24px}.card{background:white;border-radius:12px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08);margin-bottom:20px} form{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px} input,textarea,select{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px} button{background:#2563eb;color:white;border:none;padding:10px 14px;border-radius:8px;cursor:pointer} table{width:100%;border-collapse:collapse} th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:right}</style>
</head>
<body>
  <div class="nav"><a href="/">لوحة التحكم</a><a href="/products">المنتجات</a><a href="/companies">الشركات</a><a href="/rfqs">طلبات عروض الأسعار</a><a href="/orders">الطلبات</a></div>
  <div class="container">
    <div class="card">
      <h2>إنشاء طلب شراء</h2>
      <form method="post" action="/orders">
        <input name="order_number" placeholder="رقم الطلب" required />
        <select name="company_id">
          {% for company in companies %}<option value="{{ company.id }}">{{ company.name }}</option>{% endfor %}
        </select>
        <input name="total_amount" placeholder="الإجمالي" type="number" step="0.01" value="0" />
        <textarea name="notes" placeholder="ملاحظات"></textarea>
        <button type="submit">حفظ الطلب</button>
      </form>
    </div>
    <div class="card">
      <table><thead><tr><th>رقم الطلب</th><th>الشركة</th><th>الحالة</th><th>الإجمالي</th></tr></thead><tbody>{% for order in orders %}<tr><td>{{ order.order_number }}</td><td>{{ order.company.name }}</td><td>{{ order.status }}</td><td>{{ order.total_amount }}</td></tr>{% endfor %}</tbody></table>
    </div>
  </div>
</body>
</html>
