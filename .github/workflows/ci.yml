name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api:
    name: API (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore --configuration Release
      - name: Test
        run: |
          if ls ../api.Tests 1>/dev/null 2>&1; then dotnet test ../api.Tests --configuration Release; else echo "no tests yet"; fi

  admin:
    name: Admin Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin_web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/admin_web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Build
        run: npm run build

  client:
    name: Client (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.32.x"
      - name: Pub get
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: |
          if [ -d test ] && [ "$(ls -A test 2>/dev/null)" ]; then flutter test; else echo "no tests yet"; fi
