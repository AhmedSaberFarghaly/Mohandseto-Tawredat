name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api:
    name: API (.NET)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore ../api.Tests/Mohandseto.Api.Tests.csproj
      - name: Build
        run: dotnet build --no-restore --configuration Release
      - name: Test
        run: dotnet test ../api.Tests --configuration Release --no-restore --collect:"XPlat Code Coverage"
      - name: Vulnerable packages
        run: dotnet package list --vulnerable --include-transitive

  admin:
    name: Admin Web (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin_web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/admin_web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint --if-present
      - name: Build
        run: npm run build
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

  client:
    name: Client (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.32.x"
      - name: Pub get
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: |
          if [ -d test ] && [ "$(ls -A test 2>/dev/null)" ]; then flutter test; else echo "no tests yet"; fi

  containers:
    name: Container release gate
    runs-on: ubuntu-latest
    needs: [api, admin]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Validate Compose model
        run: docker compose config --quiet
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: mohandseto-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
      - name: Build Admin image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin_web/Dockerfile
          push: false
          tags: mohandseto-admin:${{ github.sha }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.24.3 git --source=/repo --redact --no-banner
